<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle+</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/variaveis.css">
</head>
<body>

  <header class="header">
        <div class="menu-icon"></div>
        <div class="logo">
            <img src="images/logo.png" alt="">

        </div>
        <div class="profile">
            <img src="images/avatar.svg" alt="Avatar">
        </div>
    </header>

  <div class="container">
  <form id="form-transacao" class="form-box" method="POST">    
    <div class="row">
      <div class="form-group">
        <label for="valor">Valor</label>
        <input type="text" id="valor" name="valor" placeholder="R$">
      </div>
      <div class="form-group">
        <label for="data">Data</label>
        <input type="text" id="data" name="data" placeholder="dd/mm/aaaa">
      </div>
    </div>

    <div class="row">
      <div class="form-group">
        <label for="categoria">Categoria</label>
        <div class="input-group">
          <select id="categoria" name="categoria">
            <option disabled selected>Categoria</option>
            <option value="alimentacao">Alimentação</option>
            <option value="transporte">Transporte</option>
            <option value="saude">Saúde</option>
          </select>
          <button type="button" class="add-button">+</button>
        </div>
      </div>
      <div class="form-group">
        <label for="forma-pagamento">Forma de pagamento</label>
        <div class="input-group">
          <select id="forma-pagamento" name="forma_pagamento">
            <option disabled selected>Forma de pagamento</option>
            <option value="cartao">Cartão de crédito</option>
            <option value="debito">Cartão de débito</option>
            <option value="dinheiro">Dinheiro</option>
            <option value="pix">Pix</option>
          </select>
          <button type="button" class="add-button">+</button>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label for="descricao">Descrição</label>
      <textarea id="descricao" name="descricao" rows="4" placeholder="Descreva o item..."></textarea>
    </div>

    <div class="buttons">
      <button type="reset" class="cancel">Cancelar</button>
      <button type="submit" class="save">Salvar</button>
    </div>

  </form>
</div>


  <div class="footer">
    Este aplicativo é fictício e não possui qualquer vínculo com a instituição financeira real.
  </div>

<script src="js/index.js"></script>
</body>
</html>
